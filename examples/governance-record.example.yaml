  notes: "This governance record does not approve compensation, legal ownership, originality ranking, or automatic enforcement."

  timestamp: "2026-06-05T04:00:00Z"
  created_at: "2026-06-05T04:00:00Z"
  updated_at: "2026-06-05T04:00:00Z"

  contestability:
    state: challenge_allowed
    challenge_allowed: true
    challenge_deadline: "2026-07-05T04:00:00Z"
