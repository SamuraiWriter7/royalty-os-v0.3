scoring_boundary:
  id: scoring-boundary-001
  version: "0.3.0-draft"
  purpose: review_support_only
  description: "Defines which scoring fields may support review and which are prohibited in Royalty OS v0.3."

  allowed_fields:
    - confidence
    - review_score
    - evidence_quality
    - reference_depth
    - signal_strength
    - priority

  prohibited_fields:
    - automatic_money_value
    - final_creator_rank
    - legal_ownership_score
    - absolute_originality_score
    - automatic_compensation_score
    - final_entitlement_score

  boundary_rules:
    - scores_support_review
    - scores_do_not_replace_judgment
    - confidence_is_not_truth
    - evidence_quality_is_not_legal_proof
    - signal_strength_is_not_entitlement
    - priority_is_not_creator_rank
    - ai_scoring_must_remain_reviewable
    - uncertainty_must_remain_visible
    - scores_may_not_trigger_automatic_execution
    - scores_may_not_calculate_compensation

  execution_boundary:
    automatic_execution: false
    automatic_compensation: false
    automatic_royalty_allocation: false
    legal_ownership_decision: false
    final_creator_ranking: false
    absolute_originality_scoring: false
    requires_human_review: true
    requires_governance_for_high_impact_cases: true

  created_at: "2026-06-05T00:00:00Z"
  updated_at: "2026-06-05T00:00:00Z"

