scoring_boundary:
  id: scoring-boundary-001
  version: "0.3.0-draft"
  purpose: review_support_only
  description: "A scoring boundary example defining which scores may support review and which scores are prohibited in Royalty OS v0.3."

  allowed_fields_used:
    - confidence
    - review_score
    - evidence_quality
    - reference_depth
    - signal_strength
    - priority

  prohibited_fields_used:
    - automatic_money_value
    - final_creator_rank
    - legal_ownership_score
    - absolute_originality_score
    - automatic_compensation_score
    - final_entitlement_score

  scores:
    confidence:
      relationship_confidence: 0.82
      evidence_confidence: 0.76
      review_confidence: 0.78
    review_score: 0.78
    evidence_quality: sufficient
    reference_depth: deep
    signal_strength: high
    priority: high
    score_review_status: human_reviewed
    uncertainty: requires_review

  status: passed
  reviewed_by: "Example Maintainer"
  reviewed_at: "2026-06-05T03:00:00Z"
  notes: "The scoring boundary check passed. No prohibited scoring fields were used."
