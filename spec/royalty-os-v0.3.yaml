royalty_os_v0_3:
id: royalty-os-v0.3
title: "Royalty OS v0.3"
subtitle: "Policy-Guided Value Graph Architecture"
version: "0.3.0-draft"
status: draft
specification_stage: architecture_and_schema_design
license: MIT

description: >
Royalty OS v0.3 transforms value event logs into policy-guided value graphs.
It does not automatically decide value, ownership, compensation, originality,
or legal entitlement. It structures value relationships so that humans and
AI systems can review them responsibly.

core_statement: >
Royalty OS v0.3 does not decide value automatically.
It structures value relationships so that humans and AI can review them responsibly.

operating_model:
- human_reviewed
- ai_assisted
- policy_guided

roadmap_position:
previous_versions:
- version: "0.1"
name: "Trace-to-Value Record"
role: "Static trace and value record layer"
- version: "0.2"
name: "Event-Based Value Circulation"
role: "Event log and value circulation layer"
current_version:
version: "0.3"
name: "Policy-Guided Value Graph Architecture"
role: "Graph, policy, scoring boundary, and governance review layer"

architectural_layers:
- id: input_layer
name: "Input Layer"
purpose: "Receives value event logs and compatible event-based records."
outputs:
- normalized_event_records
- graph_input_records

```
- id: value_graph_layer
  name: "Value Graph Layer"
  purpose: "Transforms event logs into directed value relationships."
  outputs:
    - value_graph
    - nodes
    - edges

- id: policy_engine_layer
  name: "Policy Engine Layer"
  purpose: "Applies explicit policy rules to graph relationships and generates reviewable recommendations."
  outputs:
    - policy_recommendations
    - governance_tasks
    - unresolved_case_flags

- id: scoring_boundary_layer
  name: "Scoring Boundary Layer"
  purpose: "Defines what may and may not be scored in v0.3."
  outputs:
    - bounded_scores
    - boundary_checks
    - scoring_provenance

- id: governance_layer
  name: "Governance Layer"
  purpose: "Assigns responsibility for review, approval, rejection, escalation, and dispute handling."
  outputs:
    - governance_records
    - approval_records
    - rejection_records
    - dispute_records
    - return_records
```

core_flow:
- value_event_log
- graph_transformation
- value_graph
- policy_evaluation
- scoring_boundary_check
- governance_review
- optional_return_record

design_principles:
- structure_before_compensation
- review_before_automation
- evidence_before_scoring
- policy_before_execution
- human_responsibility_before_ai_recommendation
- uncertainty_before_false_certainty
- governance_before_public_action

non_goals:
- automatic_financial_compensation
- automatic_royalty_distribution
- legal_ownership_determination
- absolute_originality_scoring
- final_creator_ranking
- autonomous_dispute_resolution
- automatic_attribution_enforcement

value_graph_model:
description: >
The Value Graph represents relationships among origins, traces,
reference events, value signals, evidence records, reviews,
policy recommendations, governance records, allocation decisions,
and return records.

```
graph_status_values:
  - draft
  - pending_review
  - reviewed
  - approved
  - rejected
  - unresolved
  - escalated
  - archived

node_types:
  - id: origin
    description: "A source from which a trace, concept, work, structure, or value relationship may emerge."
  - id: trace
    description: "An identifiable fragment, idea, structure, pattern, reference, or conceptual marker associated with an origin."
  - id: reference_event
    description: "A detected or declared use, mention, transformation, citation, inspiration, or dependency."
  - id: value_signal
    description: "An observed indication that a reference relationship may carry value."
  - id: evidence_record
    description: "Supporting material for a value relationship."
  - id: review
    description: "A human, AI-assisted, community, or external review process."
  - id: policy_recommendation
    description: "A recommendation generated by applying a policy rule."
  - id: allocation_decision
    description: "A reviewed decision about a non-financial or procedural return."
  - id: return_record
    description: "A recorded return action such as citation, linkback, attribution, acknowledgment, or unresolved status."
  - id: governance_record
    description: "A record of responsibility, review authority, challenge, approval, rejection, escalation, or verification."

edge_types:
  - originates_from
  - contains_trace
  - references
  - referenced_by
  - generates_signal
  - supported_by
  - reviewed_by
  - evaluated_under
  - recommends
  - decided_by
  - returns_to
  - escalated_to
  - recorded_as

integrity_rules:
  - "Every Trace should be linked to an Origin."
  - "Every ReferenceEvent should identify a target."
  - "Every ValueSignal should be linked to a ReferenceEvent or Trace."
  - "Every EvidenceRecord should identify supporting material."
  - "Every Review should identify a reviewer role."
  - "Every PolicyRecommendation should identify the applied policy rule."
  - "Every GovernanceRecord should identify an actor, action, and timestamp."
  - "Every ReturnRecord should identify what was returned and to which origin."
  - "Unresolved cases should be preserved instead of deleted."
```

policy_engine:
id: royalty-os-v0.3-policy-engine
mode: policy_guided_review
execution_boundary: no_automatic_execution

```
description: >
  The Policy Engine evaluates value graph relationships using explicit
  policy rules and generates reviewable recommendations. It does not
  execute compensation, determine ownership, or make final value judgments.

allowed_recommendations:
  - cite_origin
  - add_linkback
  - add_conceptual_attribution
  - add_acknowledgment
  - request_more_evidence
  - request_human_review
  - request_governance_review
  - request_external_verification
  - mark_as_unresolved
  - mark_as_low_priority
  - no_action_required

prohibited_actions:
  - automatic_payment
  - automatic_royalty_allocation
  - legal_ownership_assignment
  - final_creator_ranking
  - absolute_originality_scoring
  - automatic_attribution_enforcement
  - autonomous_dispute_resolution

signal_strength_values:
  - none
  - low
  - medium
  - high
  - critical

evidence_quality_values:
  - none
  - weak
  - partial
  - sufficient
  - strong
  - verified

review_status_values:
  - not_reviewed
  - pending_review
  - ai_assisted_review
  - human_reviewed
  - approved
  - rejected
  - unresolved
  - escalated

recommendation_status_values:
  - draft
  - pending_human_review
  - pending_governance_review
  - approved
  - rejected
  - unresolved
  - archived

conflict_resolution_priority:
  - governance_review
  - human_review
  - request_more_evidence
  - mark_as_unresolved
  - attribution_recommendation
  - no_action_required

example_rules:
  - id: policy-high-signal-attribution
    name: "High Signal Attribution Rule"
    description: "Recommend attribution when a high signal is supported by sufficient evidence and approved review."
    conditions:
      signal_strength: high
      evidence_quality:
        - sufficient
        - strong
        - verified
      review_status:
        - approved
        - human_reviewed
    recommendations:
      - cite_origin
      - add_linkback
      - add_conceptual_attribution
    enforcement_level: recommendation_only

  - id: policy-insufficient-evidence
    name: "Insufficient Evidence Rule"
    description: "Request more evidence when a signal exists but evidence quality is insufficient."
    conditions:
      signal_strength:
        - medium
        - high
        - critical
      evidence_quality:
        - none
        - weak
        - partial
    recommendations:
      - request_more_evidence
      - mark_as_unresolved
    enforcement_level: requires_human_review

  - id: policy-critical-signal-escalation
    name: "Critical Signal Escalation Rule"
    description: "Escalate critical value signals to governance review."
    conditions:
      signal_strength: critical
      evidence_quality:
        - sufficient
        - strong
        - verified
    recommendations:
      - request_governance_review
      - request_external_verification
    enforcement_level: requires_governance_review
```

scoring_boundary:
id: royalty-os-v0.3-scoring-boundary
purpose: review_support_only

```
description: >
  The Scoring Boundary defines which scoring fields may support review
  and which scoring fields are prohibited because they would create unsafe
  automated judgment.

allowed_fields:
  - confidence
  - review_score
  - evidence_quality
  - reference_depth
  - signal_strength
  - priority

prohibited_fields:
  - automatic_money_value
  - final_creator_rank
  - legal_ownership_score
  - absolute_originality_score
  - automatic_compensation_score
  - final_entitlement_score

confidence_range:
  minimum: 0.0
  maximum: 1.0
  interpretation:
    low: "0.00 - 0.30"
    moderate: "0.31 - 0.60"
    high: "0.61 - 0.85"
    very_high: "0.86 - 1.00"

reference_depth_values:
  - surface
  - minor
  - moderate
  - deep
  - structural

priority_values:
  - low
  - medium
  - high
  - urgent

uncertainty_values:
  - clear
  - uncertain
  - conflicting
  - unresolved
  - requires_review
  - requires_external_verification

boundary_rules:
  - "Scores may support review, but must not replace review."
  - "Scores may prioritize cases, but must not determine final value."
  - "Scores may describe confidence, but must not declare legal truth."
  - "Scores may summarize evidence, but must not prove ownership."
  - "Scores may support attribution recommendations, but must not enforce attribution."
  - "Scores may inform governance, but must not override governance."
```

governance_layer:
id: royalty-os-v0.3-governance-layer
mode: human_reviewed_ai_assisted_policy_guided

```
description: >
  The Governance Layer defines responsibility for reviewing, approving,
  rejecting, challenging, verifying, escalating, or archiving value relationships.

roles:
  - originator
  - maintainer
  - reviewer
  - ai_assistant
  - community_reviewer
  - external_verifier
  - governance_steward
  - dispute_reviewer
  - observer

allowed_actions:
  - approve
  - reject
  - request_more_evidence
  - request_human_review
  - request_external_verification
  - mark_as_unresolved
  - escalate
  - archive
  - revise
  - challenge
  - comment
  - reopen

prohibited_actions:
  - automatic_compensation_approval
  - legal_ownership_assignment
  - final_creator_ranking
  - automatic_attribution_enforcement
  - unresolved_case_deletion
  - autonomous_dispute_resolution

governance_status_values:
  - draft
  - pending
  - in_review
  - approved
  - rejected
  - unresolved
  - escalated
  - archived
  - reopened

governance_task_types:
  - human_review_required
  - external_verification_required
  - dispute_review_required
  - evidence_review_required
  - policy_exception_review
  - unresolved_case_review
  - score_review_required
  - public_attribution_review

dispute_types:
  - incorrect_attribution
  - missing_attribution
  - insufficient_evidence
  - wrong_origin
  - policy_misapplication
  - score_disagreement
  - governance_process_issue

contestability_states:
  - open
  - challenge_allowed
  - challenge_submitted
  - under_reconsideration
  - closed
  - archived

boundary_rules:
  requires_human_review_for_public_action: true
  requires_governance_record_for_approval: true
  preserves_unresolved_cases: true
  allows_ai_assistance: true
  allows_ai_final_decision: false
  prohibits_automatic_compensation: true
```

relationship_to_v0_2:
description: >
Royalty OS v0.3 builds on Royalty OS v0.2 by transforming value event
logs into policy-guided value graphs. v0.2 remains the chronological
event layer. v0.3 becomes the relational review layer.

```
transformation_flow:
  - collect_v0_2_value_event_logs
  - normalize_event_records
  - extract_nodes
  - construct_edges
  - build_value_graph
  - apply_policy_engine
  - apply_scoring_boundary
  - create_governance_tasks
  - record_review_outcomes

conceptual_mapping:
  value_event_log: value_graph_input
  origin_event: origin_node
  trace_event: trace_node
  reference_event: reference_event_node
  value_signal_event: value_signal_node
  review_event: review_node
  allocation_event: allocation_decision_node
  return_event: return_record_node
  event_sequence: directed_graph_path
  event_metadata: evidence_and_governance_context

compatibility_principles:
  - "v0.3 should not discard v0.2 event records."
  - "v0.3 should preserve event timestamps where possible."
  - "v0.3 should preserve origin and trace identifiers where possible."
  - "v0.3 should record transformation provenance."
  - "v0.3 should treat v0.2 events as inputs, not obsolete artifacts."
```

transformation_record:
recommended_fields:
- id
- source_version
- target_version
- source_event_ids
- target_value_graph_id
- transformed_by
- reviewed_by
- transformed_at

public_action_boundary:
requires_governance_review_for:
- adding_citation
- adding_linkback
- publishing_attribution
- updating_return_record
- marking_case_as_approved
- changing_public_status_of_value_relationship

```
rule: >
  If an action affects public attribution, public record, reputation,
  or future return pathway, then governance review is required.
```

validation_targets:
schemas:
- schemas/value-graph.schema.json
- schemas/policy-rule.schema.json
- schemas/scoring-boundary.schema.json
- schemas/governance-record.schema.json
- schemas/royalty-os-v0.3-record.schema.json

```
examples:
  - examples/value-graph.example.yaml
  - examples/policy-rule.example.yaml
  - examples/scoring-boundary.example.yaml
  - examples/governance-record.example.yaml
```

recommended_documents:
